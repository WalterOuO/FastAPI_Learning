name: FastAPI CI Test

on:
  push:
    branches: [ "main" ]

jobs:
  job1:
    runs-on: ubuntu-latest

    # 現代做法：在 CI 流程中直接拉起一個測試用的臨時資料庫
    services:
      postgres-db:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: ${{ secrets.DATABASE_PASSWORD }} # 從 Secrets 安全讀取
          POSTGRES_DB: fastapi_test
        ports:
          - 5432:5432
        # 確保 postgres 完全啟動後才開始跑 job
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # 全局環境變數設定
    env:
      # 常數、非機密資訊可以直接寫明文
      DATABASE_HOSTNAME: localhost
      DATABASE_PORT: 5432
      DATABASE_NAME: fastapi_test
      DATABASE_USERNAME: test_user
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      
      # 關鍵：敏感機密資訊，100% 透過安全憑證代入
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install python version 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'          # 沒加 cache: 每次push完都要下載編譯安裝requirements套件，浪費時間
                                #   加 cache: 第一次還是會下載，載完會內存到 GitHub快取空間，未來 push會先比對requirements
                                #   如果沒變，就直接從快取空間解壓縮到虛擬機中還原，如果有變，就會重新下載安裝，然後更新快取空間的內容

      - name: Update pip
        run: python -m pip install --upgrade pip

      - name: Install all dependencies
        run: pip install -r requirements.txt

      - name: Test with pytest
        run: |
          pip install pytest
          pytest
